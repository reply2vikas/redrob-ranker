ai_usage_summary: |
  Used Claude for architecture discussion, code review, and drafting the
  scoring logic and reasoning templates. All design decisions (component
  weights, trap detection, behavioral multiplier) were reviewed and tuned by
  me, and I can walk through every part of the code. No candidate data was
  sent to any hosted LLM during ranking — the ranking step is fully local,
  CPU-only, and offline.

# ---------------------------------------------------------------------------
methodology_summary: |
  Hybrid ranker over candidate EVIDENCE text (summary + career-history
  descriptions), deliberately ignoring unreliable current_title and raw skill
  labels. Semantic score = 0.4 lexical TF-IDF + 0.6 LSA (TruncatedSVD) cosine
  vs a distilled JD query. An additive rule layer encodes the JD's explicit
  signals: 5-9yr band, entire-career-consulting disqualifier, IR/NLP reward vs
  CV/speech/robotics penalty, keyword-stuffing penalty, and honeypot detection
  via internal impossibilities. A behavioral multiplier (recency, recruiter
  response, open-to-work, interview completion) down-weights candidates who are
  not realistically available. Sort desc, tie-break candidate_id ascending.
  Fully CPU/offline; ~seconds on the full pool.

